<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FocusClock — Minimal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg-1: #04120d;
      --bg-2: #071b14;
      --accent: #16a34a;
      --muted: rgba(255,255,255,0.75);
      --text: #e6f5ee;
      --glass: rgba(255,255,255,0.03);
    }
    [data-theme='light']{
      --bg-1: #f6fff8;
      --bg-2: #f0fbf3;
      --accent: #059669;
      --muted: rgba(0,0,0,0.65);
      --text: #06221a;
      --glass: rgba(0,0,0,0.04);
    }

    html,body{height:100%;margin:0;font-family:Inter,system-ui,Segoe UI,Arial;background:linear-gradient(180deg,var(--bg-1),var(--bg-2));color:var(--text);-webkit-font-smoothing:antialiased}

    /* Minimal top-right theme toggle */
    .theme-toggle{position:fixed;right:18px;top:18px;width:44px;height:44px;border-radius:10px;background:var(--glass);border:1px solid rgba(255,255,255,0.04);display:flex;align-items:center;justify-content:center;color:var(--muted);cursor:pointer;backdrop-filter:blur(6px)}

    /* Centered clock */
    .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .clock-card{display:flex;flex-direction:column;align-items:center;gap:18px;padding:28px;border-radius:18px;background:transparent}

    .time{font-weight:800;letter-spacing: -0.02em;line-height:0.95;text-align:center;font-variant-numeric:tabular-nums;}
    .time .digits{font-size:clamp(4.5rem, 18vw, 12rem);}
    .time .seconds{font-size:clamp(1.2rem, 2.6vw, 1.8rem);opacity:.9;margin-left:8px}

    .date{font-size:clamp(.95rem,1.6vw,1.12rem);color:var(--muted);text-align:center}

    /* 3D container (small, punchy) */
    #three-container{width:clamp(180px,28vw,420px);height:clamp(180px,28vw,420px);margin-top:6px}

    .colon{display:inline-block;color:var(--accent);}
    @keyframes blink{50%{opacity:0}} .colon.blink{animation:blink .6s steps(1) infinite}

    @media (max-width:720px){
      .time .digits{font-size:clamp(4rem, 26vw, 8rem)}
      #three-container{width:200px;height:200px}
    }
  </style>
</head>
<body>
  <button id="mode-toggle" class="theme-toggle" aria-pressed="false" title="Toggle theme">🌙</button>

  <main class="wrap">
    <section class="clock-card" role="main">
      <div class="time" aria-live="polite">
        <span class="digits" id="time-display">00:00</span>
        <span class="seconds" id="sec-display">00</span>
      </div>
      <div id="date" class="date">Loading…</div>
      <div id="three-container" aria-hidden="true"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
  <script>
    // --- Theme (only Dark / Light as requested) ---
    const themeKey = 'focusClockTheme';
    const stored = localStorage.getItem(themeKey) || 'dark';
    document.documentElement.setAttribute('data-theme', stored);
    const modeBtn = document.getElementById('mode-toggle');
    function updateModeIcon(){ modeBtn.textContent = document.documentElement.getAttribute('data-theme')==='dark' ? '🌙' : '🌞'; }
    modeBtn.addEventListener('click', ()=>{ const t = document.documentElement.getAttribute('data-theme')==='dark' ? 'light' : 'dark'; document.documentElement.setAttribute('data-theme', t); localStorage.setItem(themeKey, t); updateModeIcon(); });
    updateModeIcon();

    // --- Time rendering (large digits + small date) ---
    const timeDisplay = document.getElementById('time-display');
    const secDisplay = document.getElementById('sec-display');
    const dateEl = document.getElementById('date');

    function pad(n){ return String(n).padStart(2,'0'); }
    function tick(){
      const now = new Date();
      const h = pad(now.getHours());
      const m = pad(now.getMinutes());
      const s = pad(now.getSeconds());
      timeDisplay.textContent = `${h}:${m}`;
      secDisplay.textContent = s;
      dateEl.textContent = now.toLocaleDateString(undefined,{weekday:'long', month:'long', day:'numeric'});
    }
    // align to second boundary
    (function startClock(){ tick(); const delay = 1000 - (Date.now() % 1000); setTimeout(()=>{ tick(); setInterval(tick, 1000); }, delay); })();

    // --- Optimized 3D scene (small, punchy, performant) ---
    (function init3(){
      const container = document.getElementById('three-container');
      if(!container) return;

      const scene = new THREE.Scene();
      const sizes = ()=>({w: container.clientWidth, h: container.clientHeight});
      const {w,h} = sizes();
      const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.6));
      renderer.setSize(w,h); renderer.setClearColor(0x000000, 0);
      container.appendChild(renderer.domElement);

      const camera = new THREE.PerspectiveCamera(45, w/h, 0.1, 100);
      camera.position.set(0,0,3.2);
      scene.add(camera);

      // lights
      const amb = new THREE.AmbientLight(0xffffff, 0.6); scene.add(amb);
      const p = new THREE.PointLight(0xffffff, 1.2, 10); p.position.set(2,2,2); scene.add(p);

      // geometry detail tuned by width for perf
      function detailForWidth(){ const W = window.innerWidth; if(W>1600) return 4; if(W>1100) return 3; if(W>700) return 2; return 1; }

      let detail = detailForWidth();
      let geo = new THREE.IcosahedronGeometry(1, detail);

      const mat = new THREE.MeshStandardMaterial({color: 0x10b981, emissive: 0x053728, roughness: 0.18, metalness: 0.55});
      const mesh = new THREE.Mesh(geo, mat); scene.add(mesh);

      // additive glow layer
      const glowMat = new THREE.MeshBasicMaterial({color:0x10b981, transparent:true, opacity:0.12, blending:THREE.AdditiveBlending});
      const glow = new THREE.Mesh(geo.clone(), glowMat); glow.scale.set(1.12,1.12,1.12); scene.add(glow);

      // small ring for punch
      const ringGeo = new THREE.TorusGeometry(1.35, 0.04, 20, 80);
      const ringMat = new THREE.MeshBasicMaterial({color:0x20c787, transparent:true, opacity:0.06});
      const ring = new THREE.Mesh(ringGeo, ringMat); ring.rotation.x = Math.PI * 0.35; scene.add(ring);

      // handle resize
      function onResize(){ const {w,h} = sizes(); renderer.setSize(w,h); camera.aspect = w/h; camera.updateProjectionMatrix(); }
      window.addEventListener('resize', onResize);

      // pause rendering when tab not visible
      let running = true;
      document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) { if(!running){ running = true; animate(); } } else { running = false; } });

      const clock = new THREE.Clock();
      function animate(){ if(!running) return; requestAnimationFrame(animate); const t = clock.getElapsedTime();
        // rotation + soft pulse tied to time
        mesh.rotation.y += 0.008; mesh.rotation.x = Math.sin(t*0.25)*0.06;
        const pulse = 1 + Math.sin(t*2.0) * 0.03;
        mesh.scale.setScalar(pulse);
        glow.scale.setScalar(1.12 + Math.sin(t*2.8)*0.02);
        ring.rotation.z += 0.005 + Math.sin(t*0.6)*0.002;

        // moving light
        p.position.x = Math.cos(t*0.8)*2.2; p.position.y = Math.sin(t*0.9)*1.6; p.position.z = Math.sin(t*0.7)*1.8;

        renderer.render(scene, camera);
      }

      // re-create geometry if detail threshold changes on resize
      let lastDetail = detail;
      setInterval(()=>{ const d = detailForWidth(); if(d !== lastDetail){ lastDetail = d; const pos = mesh.position.clone(); scene.remove(mesh); scene.remove(glow); geo.dispose(); geo = new THREE.IcosahedronGeometry(1, d); mesh.geometry = geo; glow.geometry = geo.clone(); scene.add(mesh); scene.add(glow); } }, 1200);

      animate();
    })();
  </script>
</body>
</html>
